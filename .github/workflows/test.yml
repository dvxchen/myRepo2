name: 带参数 Action

# 定义参数（这里加）
inputs:
  参数名:
    description: '说明'
    required: true/false
    default: '默认值'
on:
  workflow_dispatch:
    inputs:
      环境:
        description: '运行环境'
        required: true
        default: 'test'
      消息:
        description: '自定义消息'
        required: false
        default: 'hello'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 使用参数
        run: echo "环境 = ${{ inputs.环境 }}, 消息 = ${{ inputs.消息 }}"
