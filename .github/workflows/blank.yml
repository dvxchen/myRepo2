# .github/workflows/test-and-email.yml
name: Cypress 定时测试 + 结果邮件通知
# 触发条件：定时 + 手动触发 + 代码推送
on:
  # 定时运行配置（关键！）
  # UTC 时间 12:00 = 北京时间 20:00；可根据需求修改
  # 格式：分 时 日 月 周（Cron 表达式）
  schedule:
    - cron: '0 14 * * *' # 每天 UTC 14点（北京时间22点）运行
    # 可选：每周一到周五 凌晨2点（UTC 18点）运行
    # - cron: '0 18 * * 1-5'
  # 手动触发（方便测试）
  workflow_dispatch:
  # 代码推送到 main 分支时触发（可选保留）
  push:
    branches: [ main ]

jobs:
  cypress-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          # 修复锁文件同步问题（避免 npm ci 报错）
          npm install --package-lock-only || npm install
          npm ci

      - name: Create report directory (关键！避免文件生成失败)
        run: mkdir -p ./cypress/reports  # 提前创建报告文件夹

      - name: Run Cypress (强制生成 JSON 报告，即使测试失败)
        run: |
          # --no-exit 确保即使测试失败，也会生成报告（默认测试失败会直接退出）
          npx cypress run --reporter json --reporter-options "file=./cypress/reports/test-results.json" || \
          echo "Cypress tests failed, but report file may still exist"

      - name: Debug - List files (关键调试步骤！查看文件是否生成)
        run: |
          echo "=== List report directory files ==="
          ls -la ./cypress/reports/  # 打印目录内容，确认 JSON 文件存在
          echo "=== JSON file content (if exists) ==="
          cat ./cypress/reports/test-results.json || echo "JSON file not found"

      - name: Read and parse Cypress JSON report (安全解析)
        id: parse-report
        run: |
          # 1. 检查 JSON 文件是否存在
          if [ ! -f "./cypress/reports/test-results.json" ]; then
            echo "Error: Cypress JSON report file not found!"
            exit 1  # 主动退出，提示文件不存在
          fi

          # 2. 验证 JSON 格式是否合法（避免 jq 解析报错）
          if ! jq empty ./cypress/reports/test-results.json; then
            echo "Error: Invalid JSON format in report file!"
            exit 2
          fi

          # 3. 解析关键数据（适配 Cypress JSON 报告的标准结构）
          # Cypress JSON 报告的核心字段：totalFailed/totalPassed/totalTests/totalSkipped
          total_tests=$(jq '.totalTests' ./cypress/reports/test-results.json)
          failed_tests=$(jq '.totalFailed' ./cypress/reports/test-results.json)
          passed_tests=$(jq '.totalPassed' ./cypress/reports/test-results.json)
          skipped_tests=$(jq '.totalSkipped' ./cypress/reports/test-results.json)

          # 4. 输出解析结果（日志可见）
          echo "=== Cypress Test Results ==="
          echo "Total tests: $total_tests"
          echo "Passed tests: $passed_tests"
          echo "Failed tests: $failed_tests"
          echo "Skipped tests: $skipped_tests"

          # 5. 将结果存入 GitHub Actions 环境（供后续步骤使用）
          echo "TOTAL_TESTS=$total_tests" >> $GITHUB_OUTPUT
          echo "FAILED_TESTS=$failed_tests" >> $GITHUB_OUTPUT
          echo "PASSED_TESTS=$passed_tests" >> $GITHUB_OUTPUT

      - name: Use parsed results (示例：判断是否有失败用例)
        run: |
          if [ "${{ steps.parse-report.outputs.FAILED_TESTS }}" -gt 0 ]; then
            echo "❌ There are ${{ steps.parse-report.outputs.FAILED_TESTS }} failed tests!"
            # 可选：如果需要让 workflow 失败，取消下面的注释
            # exit 1
          else
            echo "✅ All ${{ steps.parse-report.outputs.TOTAL_TESTS }} tests passed!"
          fi
