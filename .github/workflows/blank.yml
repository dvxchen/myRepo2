name: Slack Notify (Success/Failure)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 这里可以放你的构建/测试/部署命令
      - name: Run build
        run: echo "执行项目构建"

  # 通知任务（依赖上面的任务，无论成功失败都执行）
  notify:
    needs: build  # 等待build任务完成
    if: always()  # 必须加：无论成功/失败/取消都执行
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on SUCCESS
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {"text": "✅ 构建成功！\n仓库：${{ github.repository }}\n提交者：${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on FAILURE
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {"text": "❌ 构建失败！紧急处理！\n仓库：${{ github.repository }}\n链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
